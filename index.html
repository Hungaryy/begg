<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>스마트 단어장</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* 모바일에서 당겨서 새로고침 방지 */
            overscroll-behavior-y: none; 
        }
        .container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 90%;
            max-width: 400px;
            text-align: center;
            display: none;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
        }
        .active { display: block; }
        h1, h2 { color: #2c3e50; font-size: 1.5em; margin-bottom: 5px;}
        
        select, input, button {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 1em;
            box-sizing: border-box;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        button:hover { background-color: #2980b9; }
        .btn-secondary { background-color: #95a5a6; }
        .btn-secondary:hover { background-color: #7f8c8d; }
        
        /* 메인 메뉴 모드 버튼 */
        .mode-btn-container { margin-top: 20px; }
        .btn-memorize { background-color: #27ae60; font-size: 1.2em; padding: 20px; margin-bottom: 15px; }
        .btn-memorize:hover { background-color: #219653; }
        .btn-quiz { background-color: #34495e; font-size: 1.2em; padding: 20px; }
        .btn-quiz:hover { background-color: #2c3e50; }
        .btn-wrong-manage { background-color: #8e44ad; margin-top: 15px; }
        .btn-wrong-manage:hover { background-color: #732d91; }
        
        /* 완료 화면 버튼 */
        .btn-go-quiz { background-color: #34495e; }
        .btn-go-quiz:hover { background-color: #2c3e50; }
        .btn-next-day { background-color: #27ae60; }
        .btn-next-day:hover { background-color: #219653; }

        /* 💾 플로피 디스크 아이콘 버튼 */
        .seed-btn-top {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
            width: auto;
            padding: 0;
            margin: 0;
        }

        /* 상태바 */
        #load-status { font-size: 0.85em; color: #e67e22; font-weight: bold; margin-bottom: 15px; }
        .status-bar {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.9em; color: #7f8c8d; border-bottom: 2px solid #eee; padding-bottom: 10px;
        }
        .progress-text { font-weight: bold; color: #3498db; font-size: 1.1em; }

        /* 퀴즈 모드 스타일 */
        #word-display { font-size: 2.2em; font-weight: bold; margin: 20px 0; color: #2c3e50; }
        .option-btn { background-color: #ecf0f1; color: #333; border: 2px solid #bdc3c7; text-align: left; padding: 15px; line-height: 1.4; }
        .option-btn.correct { background-color: #2ecc71; color: white; border-color: #27ae60; }
        .option-btn.wrong { background-color: #e74c3c; color: white; border-color: #c0392b; }
        
        /* 퀴즈 다음 문제 버튼 상태 변경 (흔들림 방지) */
        #next-btn {
            margin-top: 20px;
            background-color: #2ecc71;
        }
        #next-btn:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
            opacity: 0.7;
        }
        #next-btn:not(:disabled):hover {
            background-color: #27ae60;
        }

        /* 📖 암기 모드(카드) 스타일 */
        #card-container {
            background-color: #fcfcfc;
            border: 2px solid #eee;
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            height: 40vh; 
            min-height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            user-select: none;
            overflow-y: auto;
            touch-action: pan-y; 
        }
        .card-word { font-size: 2.3em; font-weight: bold; color: #2c3e50; margin-bottom: 10px; }
        .card-meaning { font-size: 1.2em; color: #e74c3c; font-weight: bold; margin-bottom: 25px; }
        .card-example { font-size: 1em; color: #555; font-style: italic; margin-bottom: 10px; line-height: 1.4; text-align: left; word-break: keep-all; }
        .card-translation { font-size: 0.95em; color: #7f8c8d; line-height: 1.4; text-align: left; word-break: keep-all; }
        .highlight { background-color: #ffeaa7; font-weight: bold; color: #d35400; padding: 0 2px; border-radius: 3px; }
        .swipe-hint { font-size: 0.85em; color: #bdc3c7; margin-top: 10px; font-weight: bold; }

        /* 모달(팝업) 스타일 */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: white; padding: 25px; border-radius: 12px; width: 85%; max-width: 350px; text-align: center;
        }
        #seed-display-area { background: #eee; padding: 15px; border-radius: 5px; word-break: break-all; display: none; margin-top: 10px; }
        
        /* 오답 리스트 */
        #wrong-list-container { max-height: 350px; overflow-y: auto; text-align: left; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 8px; padding: 10px; background: #fafafa; }
        .wrong-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .wrong-item:last-child { border-bottom: none; }
        .wrong-word-text { font-weight: bold; color: #2c3e50; font-size: 1.1em; }
        .wrong-meaning-text { font-size: 0.9em; color: #7f8c8d; margin-top: 3px; }
        .btn-delete { background-color: #ff7675; color: white; border: none; border-radius: 5px; width: auto; padding: 8px 12px; margin: 0 0 0 10px; font-size: 0.9em; }
    </style>
</head>
<body>

    <div id="screen-menu" class="container active">
        <button class="seed-btn-top" onclick="openSeedModal()">💾</button>
        <h1>📚 스마트 단어장</h1>
        <div style="font-size: 0.75em; color: #27ae60; font-weight: bold; margin-bottom: 10px;">기기에 학습 데이터 자동 저장 중</div>
        <div id="load-status">⏳ 서버에서 단어장을 불러오는 중...</div>
        
        <div class="mode-btn-container">
            <button class="btn-memorize" onclick="showDaySelect('memorize')">📖 암기하기 (단어 학습)</button>
            <button class="btn-quiz" onclick="showDaySelect('quiz')">✍️ 문제 맞추기 (퀴즈)</button>
        </div>
    </div>

    <div id="screen-day-select" class="container">
        <h2 id="day-select-title">학습할 파트 선택</h2>
        <select id="day-select">
            </select>
        <button id="btn-start-action" onclick="startMode()">시작하기</button>
        
        <button id="btn-wrong-manage-quiz" class="btn-wrong-manage" style="display: none;" onclick="showWrongList()">📝 오답 단어 목록 보기 및 관리</button>
        
        <button class="btn-secondary" onclick="showMenu()">뒤로 가기</button>
    </div>

    <div id="screen-memorize" class="container">
        <div class="status-bar">
            <span id="memo-mode-title" style="font-weight: bold; flex: 1; text-align: left;">Day 1</span>
            <span id="memo-progress" class="progress-text" style="flex: 1; text-align: right;">0 / 0</span>
        </div>
        
        <div id="card-container">
            <div id="card-word" class="card-word">Loading...</div>
            <div id="card-meaning" class="card-meaning"></div>
            <div id="card-example" class="card-example"></div>
            <div id="card-translation" class="card-translation"></div>
        </div>
        <div class="swipe-hint">👈 좌우로 화면을 밀어서 넘기세요 👉</div>
        
        <button class="btn-secondary" style="margin-top: 20px;" onclick="showMenu()">도중에 그만하기</button>
    </div>

    <div id="screen-memo-complete" class="container">
        <h2 style="font-size: 2em; margin-bottom: 10px;">🎉 학습 완료!</h2>
        <p id="memo-complete-msg" style="font-size: 1.1em; color: #555; margin-bottom: 30px;">Day 1 암기를 모두 마쳤습니다.</p>
        
        <button id="btn-go-quiz" class="btn-go-quiz">✍️ 방금 외운 단어 퀴즈 풀기</button>
        <button id="btn-next-day" class="btn-next-day" style="display: none;">⏭️ 다음 파트 암기하기</button>
        <button class="btn-secondary" onclick="showMenu()">🏠 메인 화면으로</button>
    </div>

    <div id="screen-quiz" class="container">
        <div class="status-bar">
            <span id="quiz-mode-title" style="font-weight: bold; flex: 1; text-align: left;">Day 1</span>
            <span id="quiz-progress" class="progress-text" style="flex: 1; text-align: center;">0 / 0</span>
            <span style="flex: 1; text-align: right;">오답 누적: <strong id="wrong-count" style="color:#e74c3c;">0</strong>개</span>
        </div>
        
        <div id="word-display">Loading...</div>
        <div id="options-container"></div>
        
        <button id="next-btn" disabled onclick="nextQuizQuestion()">다음 문제 ➔</button>
        <button class="btn-secondary" style="margin-top: 10px;" onclick="showMenu()">도중에 그만하기</button>
    </div>

    <div id="screen-wrong-list" class="container">
        <h2>📝 오답 노트 관리</h2>
        <div style="text-align: right; margin-bottom: 10px;">
            <button onclick="clearAllWrongWords()" style="width: auto; padding: 8px 15px; background-color: #e74c3c; font-size: 0.9em; border-radius: 5px;">전체 일괄 삭제 🗑️</button>
        </div>
        <div id="wrong-list-container"></div>
        <button class="btn-secondary" onclick="showDaySelect('quiz')">퀴즈 메뉴로 돌아가기</button>
    </div>

    <div id="modal-seed" class="modal-overlay">
        <div class="modal-content">
            <h2>💾 데이터 백업/복원</h2>
            <p style="font-size: 0.8em; color: #7f8c8d; margin-top: -10px;">(다른 기기로 데이터를 옮길 때만 사용)</p>
            <button onclick="generateSeed()">초압축 저장코드(Seed) 발급</button>
            <div id="seed-display-area"></div>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            <input type="text" id="seed-input" placeholder="시드 코드를 붙여넣으세요">
            <button class="btn-secondary" onclick="loadSeed()">시드 코드로 병합하기</button>
            <button class="btn-secondary" style="margin-top: 15px; background-color: #95a5a6;" onclick="closeSeedModal()">닫기</button>
        </div>
    </div>

    <script>
        let wordData = [];      
        let wrongWords = [];    
        let completedDays = { memorize: [], quiz: [] }; 

        let currentList = [];   
        let totalItems = 0;
        let currentIndex = 0;
        let isAnswered = false;
        let currentMode = '';   
        let currentSelectedDay = ''; // 현재 학습 중인 Day 저장용

        let touchStartX = 0;
        let touchEndX = 0;

        // --- 자동 저장 로컬 스토리지 ---
        function saveToLocalStorage() { 
            localStorage.setItem('mySmartWords', JSON.stringify(wrongWords)); 
            localStorage.setItem('mySmartCompleted', JSON.stringify(completedDays)); 
        }
        function loadFromLocalStorage() {
            const savedWrong = localStorage.getItem('mySmartWords');
            const savedCompleted = localStorage.getItem('mySmartCompleted');
            if (savedWrong) {
                try { wrongWords = JSON.parse(savedWrong); updateWrongCount(); } catch (e) {}
            }
            if (savedCompleted) {
                try { completedDays = JSON.parse(savedCompleted); } catch (e) {}
            }
        }

        // --- 데이터 불러오기 ---
        document.addEventListener('DOMContentLoaded', async () => {
            const statusEl = document.getElementById('load-status');
            try {
                const [wordsRes, examplesRes] = await Promise.all([
                    fetch('words.txt').catch(() => null),
                    fetch('examples.txt').catch(() => null)
                ]);

                if (!wordsRes || !wordsRes.ok) throw new Error('words.txt를 찾을 수 없습니다.');
                
                const wordsText = await wordsRes.text();
                const examplesText = (examplesRes && examplesRes.ok) ? await examplesRes.text() : '';
                
                parseAndMergeData(wordsText, examplesText);
                loadFromLocalStorage();

                statusEl.textContent = `✅ 로드 완료! (단어 ${wordData.length}개)`;
                statusEl.style.color = '#2ecc71';
            } catch (error) {
                statusEl.textContent = '❌ 파일 로드 실패. 저장소에 words.txt 가 있는지 확인하세요.';
                statusEl.style.color = '#e74c3c';
            }
        });

        function parseAndMergeData(wordsText, examplesText) {
            wordData = wordsText.trim().split('\n').map(line => {
                const parts = line.split('|');
                if (parts.length >= 3) {
                    return { 
                        day: parseInt(parts[0].trim()), 
                        word: parts[1].trim(), 
                        meaning: parts[2].trim(),
                        example: '', 
                        translation: '' 
                    };
                }
                return null;
            }).filter(item => item !== null && !isNaN(item.day));

            if (examplesText) {
                const exampleLines = examplesText.trim().split('\n');
                exampleLines.forEach(line => {
                    const parts = line.split('|');
                    if (parts.length >= 4) {
                        const targetWord = parts[0].trim().toLowerCase();
                        const matchedItem = wordData.find(w => w.word.toLowerCase() === targetWord);
                        if (matchedItem) {
                            matchedItem.example = parts[2].trim();
                            matchedItem.translation = parts[3].trim();
                        }
                    }
                });
            }
        }

        // --- 화면 전환 ---
        function showScreen(screenId) {
            document.querySelectorAll('.container').forEach(el => el.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }
        function showMenu() { showScreen('screen-menu'); updateWrongCount(); }

        // --- Day 선택창 띄우기 ---
        function showDaySelect(mode) {
            if (wordData.length === 0) {
                alert("아직 단어장이 로드되지 않았습니다."); return;
            }
            currentMode = mode;
            document.getElementById('day-select-title').innerText = mode === 'memorize' ? '📖 암기할 파트 선택' : '✍️ 퀴즈 풀 파트 선택';
            document.getElementById('btn-wrong-manage-quiz').style.display = (mode === 'quiz') ? 'block' : 'none';

            const selectEl = document.getElementById('day-select');
            selectEl.innerHTML = '<option value="wrong">⚠️ 내 오답 노트 전용</option>';
            
            const uniqueDays = [...new Set(wordData.map(item => item.day))].sort((a,b)=>a-b);
            uniqueDays.forEach(day => {
                const option = document.createElement('option');
                option.value = day;
                
                let isCompleted = false;
                if (mode === 'memorize' && completedDays.memorize.includes(day)) isCompleted = true;
                if (mode === 'quiz' && completedDays.quiz.includes(day)) isCompleted = true;
                
                option.textContent = `Day ${day} ${isCompleted ? '✅' : ''}`;
                selectEl.appendChild(option);
            });

            showScreen('screen-day-select');
        }

        function startMode() {
            currentSelectedDay = document.getElementById('day-select').value;
            
            if (currentSelectedDay === 'wrong') {
                if (wrongWords.length === 0) { alert("오답 노트가 비어있습니다!"); return; }
                currentList = wordData.filter(item => wrongWords.includes(item.word));
            } else {
                currentList = wordData.filter(item => item.day == currentSelectedDay);
            }

            if (currentList.length === 0) return;

            currentList = shuffleArray([...currentList]);
            totalItems = currentList.length;
            currentIndex = 0;

            if (currentMode === 'memorize') {
                document.getElementById('memo-mode-title').innerText = currentSelectedDay === 'wrong' ? "오답 암기" : `Day ${currentSelectedDay} 암기`;
                showScreen('screen-memorize');
                loadMemoCard();
            } else {
                document.getElementById('quiz-mode-title').innerText = currentSelectedDay === 'wrong' ? "오답 퀴즈" : `Day ${currentSelectedDay} 퀴즈`;
                showScreen('screen-quiz');
                loadQuizQuestion();
            }
        }

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function applyHighlight(text, keyword) {
            if (!text || !keyword) return text;
            const keywords = keyword.split(',').map(k => k.trim()).filter(k => k);
            let highlightedText = text;
            keywords.forEach(k => {
                const regex = new RegExp('(' + k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
                highlightedText = highlightedText.replace(regex, '<span class="highlight">$1</span>');
            });
            return highlightedText;
        }

        // --- 📖 암기 모드 로직 ---
        function loadMemoCard() {
            // 끝까지 다 본 경우 완료 화면으로 전환
            if (currentIndex >= totalItems) {
                if (currentSelectedDay !== 'wrong' && !completedDays.memorize.includes(Number(currentSelectedDay))) {
                    completedDays.memorize.push(Number(currentSelectedDay));
                    saveToLocalStorage(); 
                }
                showMemoCompleteScreen();
                return;
            }

            document.getElementById('memo-progress').innerText = `${currentIndex + 1} / ${totalItems}`;
            const item = currentList[currentIndex];
            
            document.getElementById('card-word').textContent = item.word;
            document.getElementById('card-meaning').textContent = item.meaning;
            
            const exampleDiv = document.getElementById('card-example');
            const translationDiv = document.getElementById('card-translation');
            
            if (item.example) {
                exampleDiv.style.display = 'block';
                translationDiv.style.display = 'block';
                exampleDiv.innerHTML = applyHighlight(item.example, item.word); 
                translationDiv.innerHTML = applyHighlight(item.translation, item.meaning); 
            } else {
                exampleDiv.style.display = 'none';
                translationDiv.style.display = 'none';
            }
        }

        // 스와이프 로직
        const cardContainer = document.getElementById('card-container');
        cardContainer.addEventListener('touchstart', e => { 
            touchStartX = e.changedTouches[0].screenX; 
        }, {passive: true});
        cardContainer.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        });

        function handleSwipe() {
            const threshold = 50; 
            if (touchStartX - touchEndX > threshold) {
                currentIndex++;
                loadMemoCard(); 
            } else if (touchEndX - touchStartX > threshold) {
                if (currentIndex > 0) {
                    currentIndex--;
                    loadMemoCard(); 
                }
            }
        }

        // --- 🏁 암기 완료 화면 셋팅 ---
        function showMemoCompleteScreen() {
            showScreen('screen-memo-complete');
            
            const msgEl = document.getElementById('memo-complete-msg');
            const btnQuiz = document.getElementById('btn-go-quiz');
            const btnNextDay = document.getElementById('btn-next-day');

            if (currentSelectedDay === 'wrong') {
                msgEl.innerText = "오답 노트 암기를 모두 마쳤습니다.";
                btnQuiz.onclick = () => {
                    document.getElementById('day-select').value = 'wrong';
                    currentMode = 'quiz';
                    startMode();
                };
                btnNextDay.style.display = 'none'; // 오답은 다음 파트가 없으므로 숨김
            } else {
                const dayNum = Number(currentSelectedDay);
                msgEl.innerText = `Day ${dayNum} 암기를 모두 마쳤습니다.`;

                btnQuiz.onclick = () => {
                    document.getElementById('day-select').value = dayNum;
                    currentMode = 'quiz';
                    startMode();
                };

                // 다음 Day가 존재하는지 확인
                const uniqueDays = [...new Set(wordData.map(item => item.day))].sort((a,b)=>a-b);
                const nextDay = dayNum + 1;
                
                if (uniqueDays.includes(nextDay)) {
                    btnNextDay.style.display = 'block';
                    btnNextDay.onclick = () => {
                        document.getElementById('day-select').value = nextDay;
                        currentMode = 'memorize';
                        startMode();
                    };
                } else {
                    btnNextDay.style.display = 'none';
                }
            }
        }

        // --- ✍️ 퀴즈 모드 로직 ---
        function loadQuizQuestion() {
            if (currentIndex >= totalItems) {
                alert("🎉 이번 파트의 퀴즈를 완료했습니다!");
                if (currentSelectedDay !== 'wrong' && !completedDays.quiz.includes(Number(currentSelectedDay))) {
                    completedDays.quiz.push(Number(currentSelectedDay));
                    saveToLocalStorage(); 
                }
                showMenu(); 
                return;
            }

            isAnswered = false;
            document.getElementById('next-btn').disabled = true;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            document.getElementById('quiz-progress').innerText = `${currentIndex + 1} / ${totalItems}`;
            updateWrongCount();

            const item = currentList[currentIndex];
            document.getElementById('word-display').textContent = item.word;

            let wrongOptions = wordData.filter(w => w.word !== item.word);
            wrongOptions = shuffleArray(wrongOptions).slice(0, 3);
            let allOptions = shuffleArray([item, ...wrongOptions]);

            allOptions.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = option.meaning;
                btn.onclick = () => checkQuizAnswer(btn, option.word === item.word, item);
                optionsContainer.appendChild(btn);
            });
        }

        function checkQuizAnswer(selectedBtn, isCorrect, currentItem) {
            if (isAnswered) return;
            isAnswered = true;
            const allBtns = document.querySelectorAll('.option-btn');
            
            if (isCorrect) {
                selectedBtn.classList.add('correct');
            } else {
                selectedBtn.classList.add('wrong');
                allBtns.forEach(b => { if (b.textContent === currentItem.meaning) b.classList.add('correct'); });
                if (!wrongWords.includes(currentItem.word)) {
                    wrongWords.push(currentItem.word);
                    saveToLocalStorage();
                }
            }
            updateWrongCount();
            document.getElementById('next-btn').disabled = false;
        }

        function nextQuizQuestion() {
            currentIndex++;
            loadQuizQuestion();
        }

        // --- 오답 리스트 관리 ---
        function showWrongList() { showScreen('screen-wrong-list'); renderWrongList(); }
        function renderWrongList() {
            const container = document.getElementById('wrong-list-container');
            container.innerHTML = '';
            if (wrongWords.length === 0) {
                container.innerHTML = '<div style="padding: 20px; text-align: center; color: #7f8c8d;">오답이 없습니다!</div>'; return;
            }
            [...wrongWords].reverse().forEach(wStr => {
                const item = wordData.find(w => w.word === wStr);
                const meaning = item ? item.meaning : '-';
                const div = document.createElement('div');
                div.className = 'wrong-item';
                div.innerHTML = `
                    <div style="flex: 1;">
                        <div class="wrong-word-text">${wStr}</div>
                        <div class="wrong-meaning-text">${meaning}</div>
                    </div>
                    <button class="btn-delete" onclick="removeWrongWord('${wStr}')">삭제</button>
                `;
                container.appendChild(div);
            });
        }
        function removeWrongWord(word) {
            wrongWords = wrongWords.filter(w => w !== word);
            saveToLocalStorage(); updateWrongCount(); renderWrongList();
        }
        function clearAllWrongWords() {
            if (confirm("정말 모든 오답을 초기화하시겠습니까?")) {
                wrongWords = []; saveToLocalStorage(); updateWrongCount(); renderWrongList();
            }
        }
        function updateWrongCount() {
            const els = document.querySelectorAll('#wrong-count');
            els.forEach(el => el.innerText = wrongWords.length);
        }

        // --- 모달 & 시드 기능 ---
        function openSeedModal() { document.getElementById('modal-seed').style.display = 'flex'; }
        function closeSeedModal() { document.getElementById('modal-seed').style.display = 'none'; }
        
        function generateSeed() {
            if (wrongWords.length === 0) { alert("저장할 오답이 없습니다!"); return; }
            const seed = wrongWords.map(word => {
                const index = wordData.findIndex(item => item.word === word);
                return index !== -1 ? index.toString(36).padStart(2, '0') : '';
            }).join('');
            const displayArea = document.getElementById('seed-display-area');
            displayArea.style.display = 'block';
            displayArea.innerHTML = `<span style="font-size: 1.4em; color: #e74c3c; font-weight: bold; letter-spacing: 2px;">${seed}</span>`;
        }

        function loadSeed() {
            const input = document.getElementById('seed-input').value.trim();
            if (!input) { alert("코드를 입력하세요."); return; }
            try {
                const chunks = input.match(/.{1,2}/g) || [];
                const importedWords = chunks.map(str => wordData[parseInt(str, 36)]?.word).filter(Boolean);
                if (importedWords.length > 0) {
                    wrongWords = [...new Set([...wrongWords, ...importedWords])];
                    saveToLocalStorage(); updateWrongCount();
                    alert(`${importedWords.length}개의 오답을 병합했습니다!`);
                    document.getElementById('seed-input').value = '';
                    closeSeedModal();
                } else { alert("해당하는 단어가 없습니다."); }
            } catch (e) { alert("잘못된 코드입니다."); }
        }
    </script>
</body>
</html>
